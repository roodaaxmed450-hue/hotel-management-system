{% extends 'hotel/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-screen bg-[#f8fafc] flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-[400px]">
        <!-- Card Container -->
        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden p-8 md:p-10">

            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-slate-900">Sign In</h1>
                <p class="text-slate-500 mt-2 text-sm">Enter your credentials to continue</p>
            </div>

            <!-- Login Form -->
            <form method="post" class="space-y-5">
                {% csrf_token %}

                {% if form.non_field_errors %}
                <div class="bg-red-50 border border-red-100 text-red-600 p-3 rounded-lg text-sm">
                    {{ form.non_field_errors.0|safe }}
                </div>
                {% endif %}

                <div class="space-y-1">
                    <input type="text" name="username" id="id_username" required
                        class="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200"
                        placeholder="Username">
                </div>

                <div class="space-y-1 relative">
                    <input type="password" name="password" id="id_password" required
                        class="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200"
                        placeholder="Password">
                    <button type="button"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                    </button>
                </div>

                <div class="flex items-center justify-between pt-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" id="remember"
                            class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span class="text-sm text-slate-500 group-hover:text-slate-700 transition-colors">Remember
                            me</span>
                    </label>
                    <a href="#" class="text-sm font-medium text-blue-600 hover:text-blue-700 transition-colors">Forgot
                        password?</a>
                </div>

                <button type="submit"
                    class="w-full bg-[#3b82f6] hover:bg-blue-600 text-white font-semibold py-3 rounded-lg shadow-sm transition-all duration-200 mt-2">
                    Sign In
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-8 text-center">
                <p class="text-slate-500 text-sm">
                    Don't have an account? <a href="#" class="text-blue-600 hover:underline font-medium">Create one</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
