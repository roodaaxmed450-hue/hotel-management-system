services:
  - type: web
    name: hotel-management-system
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn khms.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DJANGO_SETTINGS_MODULE
        value: khms.settings
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-db
          property: connectionString

databases:
  - name: hotel-db
    databaseName: hotel_db
    user: hotel_user
    plan: free
